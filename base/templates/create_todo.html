{% extends "base.html" %}
{% block content %}
  <div class="container">
    <h1>Create Todo</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      {% if user.is_superuser %}<div class="form-control">{{ form.user }}</div>{% endif %}
      <button type="submit">Create</button>
    </form>
  </div>
{% endblock content %}
